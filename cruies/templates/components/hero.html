{% load static %}
<section id="home" class="relative min-h-screen flex items-center justify-center">
    <div class="absolute inset-0">
        <img src="{% static 'images/image.png' %}"
            alt="Luxurious cruise ship sailing through pristine blue ocean waters at sunset with dramatic orange and pink sky"
            class="w-screen h-screen object-cover">
        <div class="hero-bg absolute inset-0"></div>
    </div>

    <div class="relative z-10 text-center text-white px-4 w-full max-w-6xl mx-auto mt-12 fade-in">
        <h1 class="font-playfair text-5xl lg:text-7xl font-bold mb-6">
            Discover the World's Most Beautiful
            <span class="text-yellow-400">Destinations</span>
        </h1>
        <p class="text-xl lg:text-2xl mb-8 opacity-90 max-w-4xl mx-auto">
            Experience luxury travel like never before with world-class amenities,
            gourmet dining, and unforgettable destinations across the globe.
        </p>
        <div class="flex flex-col sm:flex-row gap-4 justify-center mb-16">
            <a href="{% url 'flights' %}"
                class="bg-yellow-400 text-gray-900 hover:text-white hover:bg-rose-900 px-8 py-4 rounded-full font-semibold text-lg transition-all duration-300 transform hover:scale-105 inline-block text-center flex items-center">
                Book Your Flight <i class="fas fa-plane ml-2"></i>
            </a>
            <button onclick="scrollToSection('flights')"
                class="border-2 border-white text-white px-8 py-4 rounded-full font-semibold text-lg hover:bg-white hover:text-rose-900 transition-all duration-300">
                Explore Deals
            </button>
        </div>

        <!-- Flight Search Bar placed directly under the buttons -->
        <form method="get" action="{% url 'flights' %}"
            class="bg-[#2d3748]/95 backdrop-blur-md p-6 rounded-[2rem] shadow-2xl flex flex-col md:flex-row gap-4 items-end w-[90%] md:w-[80%] lg:w-full mx-auto border border-white/10 relative z-20">
            <!-- Passengers -->
            <div class="flex-1 text-left w-full">
                <label
                    class="block text-yellow-500 text-[11px] font-bold mb-2 uppercase tracking-widest">Passengers</label>
                <div class="relative">
                    <select name="passengers"
                        class="w-full bg-[#3f4a5e] text-white rounded-[1rem] px-5 py-4 appearance-none border-none focus:ring-2 focus:ring-yellow-400 outline-none transition-colors text-sm font-inter cursor-pointer">
                        <option value="1">1 Passenger</option>
                        <option value="2">2 Passengers</option>
                        <option value="3">3 Passengers</option>
                        <option value="4+">4+ Passengers</option>
                    </select>
                    <i
                        class="fas fa-chevron-down absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400 text-xs pointer-events-none"></i>
                </div>
            </div>

            <!-- From -->
            <div class="flex-[1.2] text-left w-full">
                <label class="block text-yellow-500 text-[11px] font-bold mb-2 uppercase tracking-widest">From</label>
                <input type="text" name="origin" placeholder="Origin City" required
                    class="w-full bg-[#3f4a5e] text-white rounded-[1rem] px-5 py-4 border-none focus:ring-2 focus:ring-yellow-400 outline-none transition-colors placeholder-gray-400 text-sm font-inter">
            </div>

            <!-- To -->
            <div class="flex-[1.2] text-left w-full">
                <label class="block text-yellow-500 text-[11px] font-bold mb-2 uppercase tracking-widest">To</label>
                <input type="text" name="destination" placeholder="Destination" required
                    class="w-full bg-[#3f4a5e] text-white rounded-[1rem] px-5 py-4 border-none focus:ring-2 focus:ring-yellow-400 outline-none transition-colors placeholder-gray-400 text-sm font-inter">
            </div>

            <!-- Departure -->
            <div class="flex-1 text-left w-full">
                <label
                    class="block text-yellow-500 text-[11px] font-bold mb-2 uppercase tracking-widest">Departure</label>
                <input type="date" name="departure_date" required
                    class="w-full bg-[#3f4a5e] text-gray-400 rounded-[1rem] px-5 py-4 border-none focus:ring-2 focus:ring-yellow-400 outline-none transition-colors [color-scheme:dark] text-sm font-inter">
            </div>

            <!-- Search Button -->
            <div class="w-full md:w-auto mt-4 md:mt-0">
                <button type="submit"
                    class="w-full md:w-auto bg-[#fbbf24] text-gray-900 font-bold uppercase tracking-wider px-8 py-4 rounded-[1rem] hover:bg-yellow-400 transition-all text-sm h-[52px] flex items-center justify-center whitespace-nowrap shadow-lg shadow-yellow-500/20">
                    Search Flights
                </button>
            </div>
        </form>
    </div>

    <div class="absolute bottom-8 left-1/2 transform -translate-x-1/2 text-white animate-bounce">
        <i class="fas fa-chevron-down text-2xl"></i>
    </div>
</section>
