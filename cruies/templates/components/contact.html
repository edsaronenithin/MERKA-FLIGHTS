<section id="contact" class="py-20 bg-gray-900 text-white">
    <div class="container mx-auto px-4">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
            <div>
                <h2 class="font-playfair text-4xl font-bold mb-6">Get in Touch</h2>
                <p class="text-xl text-gray-300 mb-8">
                    Have questions about our Flights? Our expert travel consultants are here to help
                    you plan the perfect Flight.
                </p>

                <div class="space-y-6">
                    <div class="flex items-center">
                        <div class="bg-rose-700 w-12 h-12 rounded-full flex items-center justify-center mr-4">
                            <i class="fas fa-phone"></i>
                        </div>
                        <div>
                            <h3 class="font-semibold">Phone</h3>
                            <p class="text-gray-300">+1 (800) 123-FLIGHTS</p>
                        </div>
                    </div>

                    <div class="flex items-center">
                        <div class="bg-rose-700 w-12 h-12 rounded-full flex items-center justify-center mr-4">
                            <i class="fas fa-envelope"></i>
                        </div>
                        <div>
                            <h3 class="font-semibold">Email</h3>
                            <p class="text-gray-300">bookings@merkaflights.com</p>
                        </div>
                    </div>

                    <div class="flex items-center">
                        <div class="bg-rose-700 w-12 h-12 rounded-full flex items-center justify-center mr-4">
                            <i class="fas fa-clock"></i>
                        </div>
                        <div>
                            <h3 class="font-semibold">Hours</h3>
                            <p class="text-gray-300">24/7 Customer Support</p>
                        </div>
                    </div>
                </div>

                <div class="mt-8">
                    <h3 class="font-semibold mb-4">Follow Us</h3>
                    <div class="flex space-x-4">
                        <a href="#"
                            class="bg-rose-700 w-10 h-10 rounded-full flex items-center justify-center hover:bg-rose-800 transition">
                            <i class="fab fa-facebook-f"></i>
                        </a>
                        <a href="#"
                            class="bg-rose-700 w-10 h-10 rounded-full flex items-center justify-center hover:bg-rose-800 transition">
                            <i class="fab fa-instagram"></i>
                        </a>
                        <a href="#"
                            class="bg-rose-700 w-10 h-10 rounded-full flex items-center justify-center hover:bg-rose-800 transition">
                            <i class="fab fa-twitter"></i>
                        </a>
                        <a href="#"
                            class="bg-rose-700 w-10 h-10 rounded-full flex items-center justify-center hover:bg-rose-800 transition">
                            <i class="fab fa-youtube"></i>
                        </a>
                    </div>
                </div>
            </div>

            <div>
                <form class="space-y-6" method="post" action="{% url 'contact' %}">
                    {% csrf_token %}
                    <div>
                        <label class="block text-sm font-medium mb-2">Name</label>
                        <input type="text" name="name" required
                            class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:border-rose-500 transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Email</label>
                        <input type="email" name="email" required
                            class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:border-rose-500 transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Phone</label>
                        <input type="tel" name="mobile"
                            class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:border-rose-500 transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Message</label>
                        <textarea rows="4" name="message" required
                            class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:border-rose-500 transition"></textarea>
                    </div>
                    <button type="submit"
                        class="w-full bg-rose-700 text-white py-3 rounded-lg font-semibold hover:bg-rose-800 transition">
                        Send Message
                    </button>
                </form>
                {% if success %}
                <script>
                    Swal.fire({
                        icon: 'success',
                        title: 'Thank You!',
                        text: 'Thank you "{{name}}" for contacting us.',
                    });
                </script>
                {% endif %}

            </div>
        </div>
    </div>
</section>
