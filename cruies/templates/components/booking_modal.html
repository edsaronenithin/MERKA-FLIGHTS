<!-- Booking Modal -->
<div id="bookingModal" class="fixed inset-0 booking-modal hidden flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-8 w-full max-w-2xl mx-4 max-h-screen overflow-y-auto">

        <div class="flex justify-between items-center mb-6">
            <h3 class="font-playfair text-3xl font-bold text-gray-900">Book Your Cruise</h3>
            <button onclick="closeBookingModal()" class="text-gray-500 hover:text-gray-700 text-2xl">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <form class="space-y-6" method="post" action="{% url 'booking' %}">
            {% csrf_token %}
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">First Name</label>
                    <input type="text" name="fname" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-rose-500 transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Last Name</label>
                    <input type="text" name="lname" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-rose-500 transition">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Email Adress(Google Account):</label>
                <input type="email" name="email" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-rose-500 transition">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Phone Number(10 digits only):</label>
                <input type="tel" name="mobile" pattern="^\d{10}$" maxlength="10" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-rose-500 transition">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Select Cruise</label>
                <select name="cruise" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-rose-500 transition">
                    <option value="">Choose a cruise package</option>
                    <option value="mediterranean">Mediterranean Explorer - Rs10,899</option>
                    <option value="caribbean">Caribbean Paradise - RS10,299</option>
                    <option value="northern-lights">Northern Lights Adventure - RS20,999</option>
                </select>

            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Number of Guests</label>
                    <select name="nguest" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-rose-500 transition">
                        <option value="">Select guests</option>
                        <option value="1">1 Guest</option>
                        <option value="2">2 Guests</option>
                        <option value="3">3 Guests</option>
                        <option value="4">4 Guests</option>
                        <option value="5+">5+ Guests</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Cabin Type</label>
                    <select name="cabin" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-rose-500 transition">
                        <option value="">Select cabin</option>
                        <option value="interior">Interior Cabin</option>
                        <option value="oceanview">Ocean View</option>
                        <option value="balcony">Balcony Cabin</option>
                        <option value="suite">Luxury Suite</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Special Requests</label>
                <textarea name="message" rows="3"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-rose-500 transition"
                    placeholder="Any special requests or dietary requirements..."></textarea>
            </div>

            <div class="flex justify-end space-x-4">
                <button type="button" onclick="closeBookingModal()"
                    class="px-6 py-3 text-gray-600 border border-gray-300 rounded-lg hover:bg-gray-50 transition">
                    Cancel
                </button>
                <button type="submit"
                    class="px-6 py-3 bg-rose-700 text-white rounded-lg hover:bg-rose-800 transition font-semibold">
                    Submit Booking Request
                </button>
            </div>

        </form>

        {% if success %}
        <script>
            Swal.fire({
                icon: 'success',
                title: 'Thank You!',
                text: 'Thank you "{{name}}" for contacting us.',
                confirmButtonColor: '#3085d6'
            });
        </script>
        {% endif %}

    </div>
</div>
